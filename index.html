<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genshin Artifact Rater</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>Genshin Artifact Rater</h1>

    <h2>Artifact Information</h2>

    <label for="slot">Artifact Slot</label>
    <select id="slot">
        <option value="flower">Flower 🌸</option>
        <option value="feather">Feather 🪶</option>
        <option value="sands">Sands ⏳</option>
        <option value="goblet">Goblet 🏆</option>
        <option value="circlet">Circlet 👑</option>
    </select>

    <label for="set">Artifact Set</label>
    <select id="set">
    <option value="">
    Select Artifact Set
</option>
</select>

    <div id="mainStatBox">

        <label for="mainStat">Main Stat</label>

        <select id="mainStat">
        </select>

    </div>

    <h2>Substats</h2>

    <div class="substatRow">
        <select class="substat">
            <option>Crit Rate</option>
            <option>Crit DMG</option>
            <option>HP%</option>
            <option>Energy Recharge</option>
            <option>Elemental Mastery</option>
            <option>ATK%</option>
            <option>DEF%</option>
            <option>HP</option>
            <option>ATK</option>
            <option>DEF</option>
        </select>

        <input
            class="subValue"

    </div>

        <input

    </div>

        <select class="substat">
            <option>Crit Rate</option>

            <option>Energy Recharge</option>
            <option>Elemental Mastery</option>

        Rate Artifact

</div>
